# ============================================================
# THESE VALUES ARE NOT ARBITRARY.
# They were derived from the ROC curve on the held-out test set
# by maximizing sensitivity at acceptable specificity.
# Change them only with validation evidence.
# ============================================================

# Primary decision threshold (melanoma vs benign)
# Lowered from 0.5 to 0.15 to achieve 80.6 % sensitivity while
# maintaining 83.7 % specificity.  A 0.5 threshold produced only
# 42 % sensitivity — unsafe for a screening tool where missed
# melanomas are the dominant clinical risk.
melanoma_threshold: 0.15

# Distance from threshold below which we flag as uncertain
# 0.15 ± 0.10 = [0.05, 0.25] is the "uncertain zone"
decision_boundary_margin: 0.10

# MC-Dropout uncertainty threshold
# std_prob > 0.2 → flag for review
uncertainty_threshold: 0.2

# Extreme low-confidence: confidently benign
low_confidence_threshold: 0.15

# Maximum latency before logging a warning (milliseconds)
latency_warning_ms: 150
latency_critical_ms: 300
