experiment_name: "melanoma-detection-resnet-quick"

model:
  name: "resnet50"
  num_classes: 2
  pretrained: true
  dropout_rate: 0.2

data:
  input_size: 224
  batch_size: 32
  num_workers: 4
  pin_memory: true

training:
  phase1_epochs: 3
  phase2_epochs: 5
  phase1_lr: 1.0e-3
  phase2_backbone_lr: 1.0e-5
  phase2_head_lr: 1.0e-4
  weight_decay: 1.0e-4
  patience: 3

loss:
  type: "focal"
  gamma: 2.0
  class_weight_strategy: "effective_num"
  beta: 0.999

seed: 42
