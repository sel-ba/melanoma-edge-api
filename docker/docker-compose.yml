version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    volumes:
      - ../models/onnx:/app/models/onnx:ro
      - ../configs:/app/configs:ro
    environment:
      - LOG_LEVEL=info
      - ENV=development
      - NO_ALBUMENTATIONS_UPDATE=1
      - ENABLE_EXPLAIN=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
